[build]
  command = ""
  publish = "public"
  functions = "netlify/functions"

[build.processing]
  skip_processing = true

# Route /api/config → the config serverless function
[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config"
  status = 200

# Route /api/orthanc-proxy → Orthanc proxy function (solves CORS)
[[redirects]]
  from   = "/api/orthanc-proxy"
  to     = "/.netlify/functions/orthanc-proxy"
  status = 200

# All other routes → SPA index (patient.html is a real file so Netlify serves it directly)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
