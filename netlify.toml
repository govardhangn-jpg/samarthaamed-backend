# ─────────────────────────────────────────────────────────────
#  SAMARTHAA MED — Netlify Configuration
# ─────────────────────────────────────────────────────────────

[build]
  command   = "echo 'Static site — no build'"
  publish   = "public"
  functions = "netlify/functions"

[build.processing]
  skip_processing = true

# ── Netlify Functions ─────────────────────────────────────────
[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from   = "/api/orthanc-proxy"
  to     = "/.netlify/functions/orthanc-proxy"
  status = 200

# ── Public patient pages — served as real files ───────────────
# Must be BEFORE the SPA catch-all

[[redirects]]
  from   = "/patient.html"
  to     = "/patient.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/report-viewer.html"
  to     = "/report-viewer.html"
  status = 200
  force  = true

# ── Doctor app — SPA catch-all (must be last) ─────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
